worker_processes auto;

events {
  worker_connections 1024;
}

http {
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 10m;

  log_format main '$remote_addr - [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer"';
  access_log /var/log/nginx/access.log main;

  upstream auth      { server auth-service:3000; }
  upstream meetings  { server meetings-service:3001; }
  upstream links     { server links-service:3002; }
  upstream passwords { server passwords-service:3003; }
  upstream notes     { server notes-service:3004; }

  server {
    listen 80;
    server_name _;

    location = /health {
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    location /api/auth/      { proxy_pass http://auth; }
    location /api/meetings/  { proxy_pass http://meetings; }
    location /api/meetings   { proxy_pass http://meetings; }
    location /api/links/     { proxy_pass http://links; }
    location /api/links      { proxy_pass http://links; }
    location /api/passwords/ { proxy_pass http://passwords; }
    location /api/passwords  { proxy_pass http://passwords; }
    location /api/notes/     { proxy_pass http://notes; }
    location /api/notes      { proxy_pass http://notes; }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }
}
