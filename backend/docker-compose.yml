services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/auth_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
    depends_on:
      - mongo

  meetings-service:
    build: ./services/meetings-service
    restart: unless-stopped
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/meetings_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo

  links-service:
    build: ./services/links-service
    restart: unless-stopped
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/links_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo

  passwords-service:
    build: ./services/passwords-service
    restart: unless-stopped
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongo:27017/passwords_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo

  notes-service:
    build: ./services/notes-service
    restart: unless-stopped
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongo:27017/notes_db
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongo

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - meetings-service
      - links-service
      - passwords-service
      - notes-service

volumes:
  mongo_data:
